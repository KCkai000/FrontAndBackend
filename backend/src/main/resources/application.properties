spring.application.name=social-media

# ==================== DataSource ====================
spring.datasource.url=jdbc:mysql://localhost:3306/simple_social_media?useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=abc123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== JWT ====================
app.jwt.secret=esun-social-media-jwt-secret-key-2024-very-long-secure-value
app.jwt.expiration-ms=86400000

# ==================== CORS ====================
app.cors.allowed-origins=http://localhost:5173

# ==================== Server ====================
server.port=8081

# Log 配置
# 根日誌層級為 INFO
logging.level.root=INFO
# 設定日誌保存目錄和文件名稱(會在專案目錄下自動建立一個 log 資料夾與 app.log 檔案)
logging.file.name=logs/app.log
